# Wrap another GitHub Action with attestation
#
# cilock-action can wrap any GitHub Action, capturing its
# execution within a signed attestation. Inputs are forwarded
# to the wrapped action.

name: Docker Build with Attestation
on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: aflock-ai/cilock-action@v1
        id: build
        with:
          step: docker-build
          action-ref: docker/build-push-action@v6
          action-inputs: |
            {
              "context": ".",
              "push": "true",
              "tags": "ghcr.io/${{ github.repository }}:${{ github.sha }}"
            }
          attestations: "environment git github oci"

      - run: echo "Attestation stored as ${{ steps.build.outputs.git_oid }}"
