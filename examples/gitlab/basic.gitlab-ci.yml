# Basic GitLab CI usage of cilock
#
# Include the reusable template and extend .cilock for each step.

include:
  - remote: 'https://raw.githubusercontent.com/aflock-ai/cilock-action/v1/gitlab/cilock.gitlab-ci.yml'

stages:
  - build
  - test

build:
  stage: build
  extends: .cilock
  variables:
    CILOCK_STEP: build
    CILOCK_COMMAND: "go build -o bin/myapp ./cmd/myapp"
  artifacts:
    paths:
      - bin/
    reports:
      dotenv: cilock.env

test:
  stage: test
  extends: .cilock
  needs: [build]
  variables:
    CILOCK_STEP: test
    CILOCK_COMMAND: "go test -v ./..."
