name: Platform capability survey

# Surveys cilock-action (Variant A, the zero-dep Node shim) across GitHub-hosted
# runner types on two axes. "Success" means the attestation actually contains
# the compiled product's digest AND we know how tracing ran:
#   - baseline (trace off): asserts the hello_built sha256 product is in the
#     attestation. Must pass on every runner.
#   - trace-probe (trace on, Linux only): asserts the product is captured AND
#     extracts summary.captureMode / traceModeDetail from the attestation so the
#     tracing backend (ebpf vs ptrace vs none) is recorded, not guessed. eBPF is
#     Linux-only and needs caps hosted runners may withhold, so a hard-fail with
#     no attestation is itself recorded (not silently green).

on:
  push:
    branches: [nk/shim-rewrite-compare]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  baseline:
    name: baseline ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - ubuntu-22.04
          - macos-15        # Apple silicon (arm64) — mac representative
          - windows-2025
          - windows-2022
          - windows-11-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
      - name: Prepare a self-contained program to compile
        shell: bash
        run: |
          mkdir -p buildtest
          printf 'module hellotest\n\ngo 1.26\n' > buildtest/go.mod
          printf 'package main\n\nfunc main() { println("hello from cilock platform survey") }\n' > buildtest/hello.go
      - name: Compile via cilock-action (trace off)
        uses: ./
        with:
          step: "baseline"
          workingdir: buildtest
          command: "go build -o hello_built ."
          trace: "false"
          attestations: "environment command-run product"
          enable-sigstore: "false"
          enable-archivista: "false"
          outfile: "${{ github.workspace }}/attestation.json"
      - name: Assert product digest captured
        shell: bash
        run: |
          test -f attestation.json || { echo "::error::no attestation.json (${{ matrix.os }})"; exit 1; }
          python3 - <<'PY'
          import json, base64, re
          d = json.load(open("attestation.json"))
          payload = base64.b64decode(d["payload"]).decode("utf-8", "replace")
          assert "hello_built" in payload, "compiled product not captured"
          m = re.search(r'"sha256":"([0-9a-f]{64})"', payload)
          assert m, "no sha256 digest for the product"
          cm = re.search(r'"captureMode":"([^"]*)"', payload)
          print("BASELINE ${{ matrix.os }}: product captured, sha256=%s..., captureMode=%s"
                % (m.group(1)[:12], cm.group(1) if cm else "(none — trace off)"))
          PY

  trace-probe:
    name: trace probe ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - ubuntu-22.04
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
      - name: Prepare a self-contained program to compile
        shell: bash
        run: |
          mkdir -p buildtest
          printf 'module hellotest\n\ngo 1.26\n' > buildtest/go.mod
          printf 'package main\n\nfunc main() { println("hello from cilock trace probe") }\n' > buildtest/hello.go
      - name: Compile via cilock-action (trace ON)
        id: trace
        continue-on-error: true # eBPF may hard-fail without caps; the report step is the real check
        uses: ./
        with:
          # Pin a binary new enough to report summary.captureMode /
          # traceModeDetail (the v1.0.4 "latest" predates those fields). rc14
          # is the latest binary that builds — rc15 against current rookery
          # main is blocked on a go.sum drift for the new commandrun/ebpf
          # module (separate cilock-action build-infra fix). rc14 already has
          # the eBPF capture code; the caps the shim now grants are what was
          # actually missing.
          version: "1.0.5-rc14"
          step: "trace-probe"
          workingdir: buildtest
          command: "go build -o hello_built ."
          trace: "true"
          attestations: "environment command-run product"
          enable-sigstore: "false"
          enable-archivista: "false"
          outfile: "${{ github.workspace }}/trace-attestation.json"
      - name: Verify the attestation actually RECORDS TRACE EVIDENCE
        shell: bash
        run: |
          echo "action step outcome: ${{ steps.trace.outcome }}"
          if [ ! -f trace-attestation.json ]; then
            echo "TRACE ${{ matrix.os }}: trace=true produced NO attestation — eBPF hard-failed on this runner (no fallback in this build). Capability gap."
            exit 0
          fi
          python3 - <<'PY'
          import json, base64
          d = json.load(open("trace-attestation.json"))
          stmt = json.loads(base64.b64decode(d["payload"]))

          # Walk the whole statement (in-toto -> attestation collection -> the
          # command-run predicate) and pull the fields that ONLY exist when
          # tracing genuinely observed the syscalls: per-process opened files
          # and the process tree. Product capture (a filesystem scan) never
          # populates these, so they are the honest "did we trace?" signal.
          opened, procs = {}, []
          cap = {"captureMode": None, "traceModeDetail": None}
          def walk(o):
              if isinstance(o, dict):
                  for k, v in o.items():
                      if k == "openedfiles" and isinstance(v, dict): opened.update(v)
                      if k == "processes" and isinstance(v, list): procs.extend(v)
                      if k in cap and isinstance(v, str): cap[k] = v
                      walk(v)
              elif isinstance(o, list):
                  for x in o: walk(x)
          walk(stmt)

          print("=== TRACE EVIDENCE on ${{ matrix.os }} ===")
          print("  captureMode   :", cap["captureMode"])
          print("  traceModeDetail:", cap["traceModeDetail"])
          print("  processes     :", len(procs))
          print("  opened files  :", len(opened))
          for p in list(opened)[:10]:
              print("    opened:", p)

          # A real `go build` reads its source, go.mod, the toolchain, and
          # writes the binary — many files. If tracing actually recorded, we
          # see them. Zero opened files => an attestation was produced but
          # NOTHING was traced.
          assert len(opened) >= 3, (
              "ATTESTATION PRODUCED BUT NO TRACE DATA: %d opened files, %d processes — "
              "tracing did not record file access on this runner" % (len(opened), len(procs)))
          print("  -> tracing IS recording (%d files, %d processes)" % (len(opened), len(procs)))
          PY

  # ── Real OSS build: product attestation + trace on a genuine project ──
  # Build a well-known OSS Go project (mikefarah/yq — single binary, real
  # dependency graph) through cilock-action and prove the attestation records
  # BOTH the built artifact as a product (with its sha256) AND real trace
  # evidence. This is the end-to-end "does it capture a real build" check, on
  # ubuntu-24.04 where eBPF engages.
  oss-build-attest:
    name: OSS build attestation (yq, ubuntu-24.04)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
      - name: Clone a real OSS project (yq)
        run: git clone --depth 1 https://github.com/mikefarah/yq yq-src
      - name: Build yq via cilock-action (trace ON)
        uses: ./
        with:
          version: "1.0.5-rc14"
          step: "oss-build-yq"
          workingdir: yq-src
          command: "go build -o yq ."
          # ROOT-CAUSE PROOF on the stale rc14 binary: trace mode emits ABSOLUTE
          # product paths, but cilock-action anchors the glob to a RELATIVE
          # workingdir ("yq-src/**"), so it never matches -> treeSize=0. Passing
          # an ABSOLUTE glob hits the anchor's `if IsAbs(p) { return p }`
          # short-circuit, so it matches the absolute trace path and captures
          # the product. (The committed run.go fix makes a relative workingdir
          # work without this; this job proves the diagnosis on real eBPF
          # hardware without waiting for a new release.)
          product-include-glob: "${{ github.workspace }}/yq-src/**"
          trace: "true"
          attestations: "environment command-run product"
          enable-sigstore: "false"
          enable-archivista: "false"
          outfile: "${{ github.workspace }}/yq-attestation.json"
      - name: Verify yq product digest + trace recorded
        shell: bash
        run: |
          test -f yq-attestation.json || { echo "::error::no attestation produced"; exit 1; }
          python3 - <<'PY'
          import json, base64
          raw = base64.b64decode(json.load(open("yq-attestation.json"))["payload"])
          stmt = json.loads(raw)

          # AUTHORITATIVE product-capture signal: the digest of the
          # "tree:products" SUBJECT. The product attestor publishes its Merkle
          # root there. An EMPTY product set yields the sha256-of-empty root
          # (e3b0c442...); a captured set yields anything else. Keying off the
          # subject digest (not a walked "merkleRoot" field, which could be the
          # materials tree) removes all ambiguity.
          EMPTY = "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
          subjects = stmt.get("subject") or []
          def subj_digest(needle):
              for s in subjects:
                  if needle in (s.get("name") or ""):
                      return (s.get("digest") or {}).get("sha256")
              return None
          prod_root = subj_digest("tree:products")
          mat_root  = subj_digest("tree:materials")

          # Trace evidence (openedfiles/processes) only exists when tracing ran.
          opened, procs, treeSize = {}, [], None
          def walk(o):
              global treeSize
              if isinstance(o, dict):
                  if "treeSize" in o and isinstance(o.get("treeSize"), int):
                      # product predicate carries treeSize alongside merkleRoot
                      if isinstance(o.get("merkleRoot"), str) and o.get("merkleRoot") == prod_root:
                          treeSize = o["treeSize"]
                  for k, v in o.items():
                      if k == "openedfiles" and isinstance(v, dict): opened.update(v)
                      if k == "processes" and isinstance(v, list): procs.extend(v)
                      walk(v)
              elif isinstance(o, list):
                  for x in o: walk(x)
          walk(stmt)

          print("=== subjects ===", [s.get("name") for s in subjects])
          print("  tree:products root :", (prod_root or "")[:24], "...  treeSize:", treeSize)
          print("  tree:materials root:", (mat_root or "")[:24], "...")
          print("=== trace ===  opened files:", len(opened), " processes:", len(procs))

          assert prod_root, "no tree:products subject in the attestation"
          assert prod_root != EMPTY, \
              "tree:products is the EMPTY-tree root (e3b0c442...) — NO products captured"
          # Sanity: materials tree should be populated too (yq-src has many files).
          assert mat_root and mat_root != EMPTY, "materials tree unexpectedly empty"
          # Trace: a real yq build opens hundreds+ of files.
          assert len(opened) >= 50, "trace too sparse for a real build (%d files)" % len(opened)
          print("END-TO-END OK: yq product tree recorded (root=%s..., treeSize=%s) + %d files / %d procs traced"
                % (prod_root[:16], treeSize, len(opened), len(procs)))
          PY
