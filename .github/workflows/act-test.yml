  # Test 19: Mock Fulcio signing with action wrapping
  action-sigstore-mock:
    name: Action wrap with mock Fulcio
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cilock-action-linux

      - name: Install binary and mock-sigstore
        run: |
          cp cilock-action-linux /usr/local/bin/cilock-action
          chmod +x /usr/local/bin/cilock-action
          if [ -f mock-sigstore-linux ]; then
            cp mock-sigstore-linux /tmp/mock-sigstore
            chmod +x /tmp/mock-sigstore
            echo "Installed mock-sigstore"
          else
            echo "mock-sigstore-linux not found, skipping test"
          fi

      - name: Start mock sigstore and run action
        env:
          INPUT_ACTION_REF: "test/test-js-action@v1"
          INPUT_STEP: "test-sigstore-mock"
          INPUT_ENABLE_SIGSTORE: "true"
          INPUT_ENABLE_ARCHIVISTA: "false"
          INPUT_FULCIO_USE_HTTP: "true"
          INPUT_OUTFILE: "/tmp/sigstore-attestation.json"
          INPUT_ATTESTATIONS: "environment"
          INPUT_HASHES: "sha256"
          INPUT_TIMESTAMP_SERVERS: ""
          INPUT_ACTION_INPUTS: '{"greeting":"sigstore test"}'
        run: |
          if [ ! -x /tmp/mock-sigstore ]; then
            echo "mock-sigstore not available, skipping"
            exit 0
          fi
          export CILOCK_LOCAL_ACTION_DIR="$(pwd)/testdata/actions"
          # Start mock-sigstore in background
          /tmp/mock-sigstore -ca-out /tmp/mock-ca.pem &
          MOCK_PID=$!
          sleep 2
          # Set Fulcio to use mock server
          export INPUT_FULCIO_URL="http://localhost:8281"
          export INPUT_FULCIO_OIDC_ISSUER="http://localhost:8283"
          export INPUT_FULCIO_OIDC_CLIENT_ID="sigstore"
          # Get a token from mock OIDC
          TOKEN=$(curl -sS -H "Authorization: bearer mock-bearer-token" \
            "http://localhost:8283/token?audience=sigstore" | node -e "
            process.stdout.write(JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).value);
          ")
          export INPUT_FULCIO_TOKEN="$TOKEN"
          # Run cilock-action
          /usr/local/bin/cilock-action || true
          kill $MOCK_PID 2>/dev/null || true

      - name: Verify sigstore-signed attestation
        run: |
          ATT=$(ls /tmp/sigstore-attestation*.json 2>/dev/null | head -1)
          if [ -z "$ATT" ]; then
            echo "WARNING: No sigstore attestation file (mock may not be supported in this environment)"
            exit 0
          fi
          node -e "
          const fs = require('fs');
          const env = JSON.parse(fs.readFileSync('$ATT', 'utf8'));
          if (env.payloadType !== 'application/vnd.in-toto+json') throw new Error('Wrong payloadType');
          const sigs = env.signatures || [];
          console.log('Signature count:', sigs.length);
          if (sigs.length > 0) {
            console.log('Has signatures from mock Fulcio!');
            if (!sigs[0].sig) throw new Error('Empty signature');
          }
          const payload = JSON.parse(Buffer.from(env.payload, 'base64').toString());
          const ga = (payload.predicate?.attestations || []).find(a => a.type.includes('github-action'));
          if (ga) {
            console.log('github-action attestor present');
            console.log('actionref:', ga.attestation.actionref);
          }
          console.log('=== PASS: sigstore mock attestation verified ===');
          "
