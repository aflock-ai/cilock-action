name: ACT Local Test

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # Build binary for all test jobs
  build:
    name: Build test binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout rookery
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: aflock-ai/rookery
          path: rookery

      - name: Rewrite replace directives for CI
        run: sed -i 's|=> \.\./rookery/|=> ./rookery/|g' go.mod

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.26'

      - name: Build binary
        run: |
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X main.version=act-test" \
            -o cilock-action-linux ./cmd/cilock-action/

      - name: Upload binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cilock-action-linux
          path: cilock-action-linux
          retention-days: 1

  # Test 1: Command wrapping without sigstore
  command-nosig:
    name: Command wrap (no sigstore)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cilock-action-linux

      - name: Install binary
        run: |
          cp cilock-action-linux /usr/local/bin/cilock-action
          chmod +x /usr/local/bin/cilock-action

      - name: Run command wrapping
        env:
          INPUT_COMMAND: "echo 'hello from cilock-action'"
          INPUT_STEP: "test-echo"
          INPUT_ENABLE_SIGSTORE: "false"
          INPUT_ENABLE_ARCHIVISTA: "false"
          INPUT_OUTFILE: "/tmp/echo-attestation.json"
          INPUT_ATTESTATIONS: "environment"
          INPUT_HASHES: "sha256"
          INPUT_TIMESTAMP_SERVERS: ""
        run: |
          /usr/local/bin/cilock-action

      - name: Verify attestation file
        run: |
          echo "=== Checking attestation file ==="
          test -f /tmp/echo-attestation.json
          node -e "
          const fs = require('fs');
          const env = JSON.parse(fs.readFileSync('/tmp/echo-attestation.json', 'utf8'));
          console.log('payloadType:', env.payloadType);
          if (env.payloadType !== 'application/vnd.in-toto+json') throw new Error('Wrong payloadType');
          const payload = JSON.parse(Buffer.from(env.payload, 'base64').toString());
          console.log('predicateType:', payload.predicateType);
          console.log('step name:', payload.predicate?.name);
          if (payload.predicate?.name !== 'test-echo') throw new Error('Wrong step name');
          console.log('=== PASS: attestation is valid ===');
          "

  # Test 2: Bypass mode
  bypass-mode:
    name: Bypass mode
    runs-on: ubuntu-latest
    needs: build
    env:
      CILOCK_BYPASS: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cilock-action-linux

      - name: Install binary
        run: |
          cp cilock-action-linux /usr/local/bin/cilock-action
          chmod +x /usr/local/bin/cilock-action

      - name: Run in bypass mode
        env:
          INPUT_COMMAND: "echo 'bypass works'"
          INPUT_STEP: "test-bypass"
        run: |
          /usr/local/bin/cilock-action
          echo "=== PASS: bypass mode works ==="

  # Test 3: File-based signing
  file-signing:
    name: File-based signing
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cilock-action-linux

      - name: Install binary
        run: |
          cp cilock-action-linux /usr/local/bin/cilock-action
          chmod +x /usr/local/bin/cilock-action

      - name: Generate test key pair
        run: |
          openssl ecparam -genkey -name prime256v1 -noout -out /tmp/test-key.pem
          openssl ec -in /tmp/test-key.pem -pubout -out /tmp/test-pub.pem
          echo "Generated test ECDSA key pair"

      - name: Run with file signer
        env:
          INPUT_COMMAND: "echo 'signed with file key'"
          INPUT_STEP: "test-file-sign"
          INPUT_ENABLE_SIGSTORE: "false"
          INPUT_ENABLE_ARCHIVISTA: "false"
          INPUT_OUTFILE: "/tmp/signed-attestation.json"
          INPUT_KEY: "/tmp/test-key.pem"
          INPUT_ATTESTATIONS: "environment"
          INPUT_TIMESTAMP_SERVERS: ""
        run: |
          /usr/local/bin/cilock-action

      - name: Verify signed attestation
        run: |
          test -f /tmp/signed-attestation.json
          node -e "
          const fs = require('fs');
          const env = JSON.parse(fs.readFileSync('/tmp/signed-attestation.json', 'utf8'));
          if (env.payloadType !== 'application/vnd.in-toto+json') throw new Error('Wrong payloadType');
          const sigs = env.signatures || [];
          if (sigs.length === 0) throw new Error('No signatures found');
          console.log('Signature count:', sigs.length);
          console.log('Key ID:', sigs[0].keyid || 'MISSING');
          if (!sigs[0].sig) throw new Error('Empty signature');
          console.log('=== PASS: file-signed attestation is valid ===');
          "

  # Test 4: Multiple attestors with git
  multi-attestor:
    name: Multiple attestors
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cilock-action-linux

      - name: Install binary
        run: |
          cp cilock-action-linux /usr/local/bin/cilock-action
          chmod +x /usr/local/bin/cilock-action

      - name: Run with multiple attestors
        env:
          INPUT_COMMAND: "echo 'multi-attestor test'"
          INPUT_STEP: "test-multi"
          INPUT_ENABLE_SIGSTORE: "false"
          INPUT_ENABLE_ARCHIVISTA: "false"
          INPUT_OUTFILE: "/tmp/multi-attestation.json"
          INPUT_ATTESTATIONS: "environment git"
          INPUT_TIMESTAMP_SERVERS: ""
        run: |
          /usr/local/bin/cilock-action

      - name: Verify multi-attestor output
        run: |
          test -f /tmp/multi-attestation.json
          node -e "
          const fs = require('fs');
          const env = JSON.parse(fs.readFileSync('/tmp/multi-attestation.json', 'utf8'));
          const payload = JSON.parse(Buffer.from(env.payload, 'base64').toString());
          const attestations = payload.predicate?.attestations || [];
          const types = attestations.map(a => a.type);
          console.log('Attestors found:', types);
          if (!types.some(t => t.includes('environment'))) throw new Error('Missing environment attestor');
          if (!types.some(t => t.includes('git'))) throw new Error('Missing git attestor');
          console.log('=== PASS: multiple attestors present ===');
          "

  # Test 5: Validation errors
  validation-errors:
    name: Validation errors
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cilock-action-linux

      - name: Install binary
        run: |
          cp cilock-action-linux /usr/local/bin/cilock-action
          chmod +x /usr/local/bin/cilock-action

      - name: Test missing step should fail
        env:
          INPUT_COMMAND: "echo test"
          INPUT_ENABLE_SIGSTORE: "false"
        run: |
          if /usr/local/bin/cilock-action 2>/dev/null; then
            echo "ERROR: Should have failed without step name"
            exit 1
          fi
          echo "=== PASS: correctly rejected missing step ==="

      - name: Test missing command and action-ref should fail
        env:
          INPUT_STEP: "test"
          INPUT_ENABLE_SIGSTORE: "false"
        run: |
          if /usr/local/bin/cilock-action 2>/dev/null; then
            echo "ERROR: Should have failed without command or action-ref"
            exit 1
          fi
          echo "=== PASS: correctly rejected missing command/action-ref ==="

  # Test 6: Command with special shell characters
  special-chars:
    name: Special shell characters
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cilock-action-linux

      - name: Install binary
        run: |
          cp cilock-action-linux /usr/local/bin/cilock-action
          chmod +x /usr/local/bin/cilock-action

      - name: Run command with pipes, quotes, and semicolons
        env:
          INPUT_COMMAND: "echo 'hello \"world\"' | cat && echo done; echo 'semicolon ok'"
          INPUT_STEP: "test-special-chars"
          INPUT_ENABLE_SIGSTORE: "false"
          INPUT_ENABLE_ARCHIVISTA: "false"
          INPUT_OUTFILE: "/tmp/special-attestation.json"
          INPUT_ATTESTATIONS: "environment"
          INPUT_TIMESTAMP_SERVERS: ""
        run: |
          /usr/local/bin/cilock-action

      - name: Verify special chars command was captured
        run: |
          test -f /tmp/special-attestation.json
          node -e "
          const fs = require('fs');
          const env = JSON.parse(fs.readFileSync('/tmp/special-attestation.json', 'utf8'));
          const payload = JSON.parse(Buffer.from(env.payload, 'base64').toString());
          const attestations = payload.predicate?.attestations || [];
          const cmdRun = attestations.find(a => a.type.includes('command-run'));
          if (!cmdRun) throw new Error('Missing command-run attestor');
          const stdout = cmdRun.attestation?.stdout || '';
          console.log('stdout:', JSON.stringify(stdout));
          if (!stdout.includes('hello')) throw new Error('Command output missing hello');
          if (!stdout.includes('done')) throw new Error('Command output missing done');
          if (!stdout.includes('semicolon ok')) throw new Error('Command output missing semicolon ok');
          console.log('=== PASS: special shell characters handled correctly ===');
          "

  # Test 7: Failed command propagates error
  failed-command:
    name: Failed command exit code
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cilock-action-linux

      - name: Install binary
        run: |
          cp cilock-action-linux /usr/local/bin/cilock-action
          chmod +x /usr/local/bin/cilock-action

      - name: Test that failing command makes cilock-action fail
        env:
          INPUT_COMMAND: "exit 42"
          INPUT_STEP: "test-fail"
          INPUT_ENABLE_SIGSTORE: "false"
          INPUT_ENABLE_ARCHIVISTA: "false"
          INPUT_ATTESTATIONS: "environment"
          INPUT_TIMESTAMP_SERVERS: ""
        run: |
          if /usr/local/bin/cilock-action 2>/dev/null; then
            echo "ERROR: Should have failed with non-zero exit"
            exit 1
          fi
          echo "=== PASS: failing command propagated error ==="

  # Test 8: Outfile in non-existent directory should fail gracefully
  bad-outfile-dir:
    name: Bad outfile directory
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cilock-action-linux

      - name: Install binary
        run: |
          cp cilock-action-linux /usr/local/bin/cilock-action
          chmod +x /usr/local/bin/cilock-action

      - name: Test outfile in non-existent directory
        env:
          INPUT_COMMAND: "echo test"
          INPUT_STEP: "test-bad-outfile"
          INPUT_ENABLE_SIGSTORE: "false"
          INPUT_ENABLE_ARCHIVISTA: "false"
          INPUT_OUTFILE: "/nonexistent/dir/attestation.json"
          INPUT_ATTESTATIONS: "environment"
          INPUT_TIMESTAMP_SERVERS: ""
        run: |
          if /usr/local/bin/cilock-action 2>/dev/null; then
            echo "ERROR: Should have failed with non-existent directory"
            exit 1
          fi
          echo "=== PASS: non-existent outfile directory handled gracefully ==="

  # Test 9: No outfile — output to stdout
  stdout-output:
    name: Stdout output (no outfile)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cilock-action-linux

      - name: Install binary
        run: |
          cp cilock-action-linux /usr/local/bin/cilock-action
          chmod +x /usr/local/bin/cilock-action

      - name: Run without outfile, capture stdout
        env:
          INPUT_COMMAND: "echo 'stdout test'"
          INPUT_STEP: "test-stdout"
          INPUT_ENABLE_SIGSTORE: "false"
          INPUT_ENABLE_ARCHIVISTA: "false"
          INPUT_OUTFILE: ""
          INPUT_ATTESTATIONS: "environment"
          INPUT_TIMESTAMP_SERVERS: ""
        run: |
          /usr/local/bin/cilock-action > /tmp/stdout-output.json 2>/tmp/stderr.log
          echo "Captured stdout to file"

      - name: Verify stdout contains valid DSSE envelope
        run: |
          test -f /tmp/stdout-output.json
          node -e "
          const fs = require('fs');
          const raw = fs.readFileSync('/tmp/stdout-output.json', 'utf8').trim();
          // stdout may contain command output before the JSON envelope — find the JSON object
          const jsonStart = raw.indexOf('{');
          if (jsonStart < 0) throw new Error('No JSON found in stdout output');
          const jsonStr = raw.substring(jsonStart);
          const env = JSON.parse(jsonStr);
          if (env.payloadType !== 'application/vnd.in-toto+json') throw new Error('Wrong payloadType: ' + env.payloadType);
          const payload = JSON.parse(Buffer.from(env.payload, 'base64').toString());
          if (payload.predicate?.name !== 'test-stdout') throw new Error('Wrong step name');
          console.log('=== PASS: stdout output is valid DSSE envelope ===');
          "

  # Test 10: Bypass mode skips validation (both command+action-ref should work)
  bypass-no-validation:
    name: Bypass skips validation
    runs-on: ubuntu-latest
    needs: build
    env:
      CILOCK_BYPASS: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cilock-action-linux

      - name: Install binary
        run: |
          cp cilock-action-linux /usr/local/bin/cilock-action
          chmod +x /usr/local/bin/cilock-action

      - name: Test bypass with both command and action-ref set
        env:
          INPUT_COMMAND: "echo 'bypass-both'"
          INPUT_ACTION_REF: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2"
          INPUT_STEP: "test-bypass-both"
          INPUT_ENABLE_SIGSTORE: "false"
        run: |
          /usr/local/bin/cilock-action
          echo "=== PASS: bypass mode ran command despite conflicting action-ref ==="

      - name: Test bypass with no step (normally required)
        env:
          INPUT_COMMAND: "echo 'bypass-no-step'"
          INPUT_ENABLE_SIGSTORE: "false"
        run: |
          /usr/local/bin/cilock-action
          echo "=== PASS: bypass mode ran without step name ==="

  # Test 11: Command with environment variable expansion
  env-expansion:
    name: Environment variable expansion
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cilock-action-linux

      - name: Install binary
        run: |
          cp cilock-action-linux /usr/local/bin/cilock-action
          chmod +x /usr/local/bin/cilock-action

      - name: Run command that uses env vars
        env:
          INPUT_COMMAND: "echo \"GITHUB_SHA=$GITHUB_SHA\" && echo \"HOME=$HOME\""
          INPUT_STEP: "test-env-expand"
          INPUT_ENABLE_SIGSTORE: "false"
          INPUT_ENABLE_ARCHIVISTA: "false"
          INPUT_OUTFILE: "/tmp/env-attestation.json"
          INPUT_ATTESTATIONS: "environment"
          INPUT_TIMESTAMP_SERVERS: ""
        run: |
          /usr/local/bin/cilock-action

      - name: Verify env vars were expanded in command output
        run: |
          node -e "
          const fs = require('fs');
          const env = JSON.parse(fs.readFileSync('/tmp/env-attestation.json', 'utf8'));
          const payload = JSON.parse(Buffer.from(env.payload, 'base64').toString());
          const cmdRun = payload.predicate?.attestations?.find(a => a.type.includes('command-run'));
          if (!cmdRun) throw new Error('Missing command-run attestor');
          const stdout = cmdRun.attestation?.stdout || '';
          console.log('stdout:', stdout.trim());
          if (!stdout.includes('GITHUB_SHA=')) throw new Error('Env var not expanded');
          if (stdout.includes('GITHUB_SHA=\$')) throw new Error('Env var not resolved');
          console.log('=== PASS: environment variables expanded in command ===');
          "

  # Test 12: Large command output
  large-output:
    name: Large command output
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cilock-action-linux

      - name: Install binary
        run: |
          cp cilock-action-linux /usr/local/bin/cilock-action
          chmod +x /usr/local/bin/cilock-action

      - name: Run command that produces large output
        env:
          INPUT_COMMAND: "seq 1 10000"
          INPUT_STEP: "test-large-output"
          INPUT_ENABLE_SIGSTORE: "false"
          INPUT_ENABLE_ARCHIVISTA: "false"
          INPUT_OUTFILE: "/tmp/large-attestation.json"
          INPUT_ATTESTATIONS: "environment"
          INPUT_TIMESTAMP_SERVERS: ""
        run: |
          /usr/local/bin/cilock-action

      - name: Verify large output attestation is valid
        run: |
          test -f /tmp/large-attestation.json
          SIZE=$(stat -c%s /tmp/large-attestation.json 2>/dev/null || stat -f%z /tmp/large-attestation.json)
          echo "Attestation file size: $SIZE bytes"
          if [ "$SIZE" -lt 1000 ]; then
            echo "ERROR: Attestation too small for large output"
            exit 1
          fi
          node -e "
          const fs = require('fs');
          const env = JSON.parse(fs.readFileSync('/tmp/large-attestation.json', 'utf8'));
          if (env.payloadType !== 'application/vnd.in-toto+json') throw new Error('Wrong payloadType');
          const payload = JSON.parse(Buffer.from(env.payload, 'base64').toString());
          const cmdRun = payload.predicate?.attestations?.find(a => a.type.includes('command-run'));
          const stdout = cmdRun?.attestation?.stdout || '';
          if (!stdout.includes('10000')) throw new Error('Missing last line of output');
          console.log('Output lines captured (approx):', stdout.split('\\n').length);
          console.log('=== PASS: large output handled correctly ===');
          "

  # Test 13: Sigstore/OIDC signing (uses act OIDC support)
  sigstore-oidc:
    name: Sigstore OIDC signing
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cilock-action-linux

      - name: Install binary
        run: |
          cp cilock-action-linux /usr/local/bin/cilock-action
          chmod +x /usr/local/bin/cilock-action

      - name: Check OIDC availability
        run: |
          echo "ACTIONS_ID_TOKEN_REQUEST_URL: ${ACTIONS_ID_TOKEN_REQUEST_URL:-NOT SET}"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+SET (hidden)}"
          if [ -z "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            echo "OIDC not available — skipping sigstore test"
            echo "Run act with --artifact-server-path to enable OIDC"
            exit 0
          fi
          echo "OIDC endpoints available!"

      - name: Get OIDC token and verify
        run: |
          if [ -z "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            echo "Skipping — no OIDC"
            exit 0
          fi
          TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sigstore" | node -e "
            const data = require('fs').readFileSync('/dev/stdin', 'utf8');
            const j = JSON.parse(data);
            process.stdout.write(j.value || j.token || '');
          ")
          if [ -z "$TOKEN" ]; then
            echo "Failed to get OIDC token"
            exit 1
          fi
          echo "Got OIDC token (length: ${#TOKEN})"
          # Decode and show claims
          echo "$TOKEN" | cut -d. -f2 | node -e "
            const b64 = require('fs').readFileSync('/dev/stdin', 'utf8').trim();
            const padded = b64 + '='.repeat((4 - b64.length % 4) % 4);
            const claims = JSON.parse(Buffer.from(padded, 'base64').toString());
            console.log('Token claims:');
            console.log('  iss:', claims.iss);
            console.log('  sub:', claims.sub);
            console.log('  aud:', claims.aud);
            console.log('  repository:', claims.repository);
          "
          echo "=== PASS: OIDC token acquired ==="

  # Test 14: JS action wrapping with github-action attestor
  action-js-fixture:
    name: Action wrap JS fixture
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cilock-action-linux

      - name: Install binary
        run: |
          cp cilock-action-linux /usr/local/bin/cilock-action
          chmod +x /usr/local/bin/cilock-action

      - name: Run JS action wrapping
        env:
          INPUT_ACTION_REF: "test/test-js-action@v1"
          INPUT_STEP: "test-js-action"
          INPUT_ENABLE_SIGSTORE: "false"
          INPUT_ENABLE_ARCHIVISTA: "false"
          INPUT_OUTFILE: "/tmp/js-action-attestation.json"
          INPUT_ATTESTATIONS: "environment"
          INPUT_HASHES: "sha256"
          INPUT_TIMESTAMP_SERVERS: ""
          INPUT_ACTION_INPUTS: '{"greeting":"hello from act test"}'
        run: |
          export CILOCK_LOCAL_ACTION_DIR="$(pwd)/testdata/actions"
          /usr/local/bin/cilock-action

      - name: Verify JS action executed
        run: |
          echo "=== Checking JS action marker file ==="
          test -f /tmp/js-action-executed || { echo "FAIL: JS action did not create marker file"; exit 1; }
          echo "JS action marker file exists"

      - name: Verify attestation with github-action attestor
        run: |
          echo "=== Checking attestation ==="
          ATT=$(ls /tmp/js-action-attestation*.json 2>/dev/null | head -1)
          test -n "$ATT" || { echo "FAIL: No attestation file found"; exit 1; }
          echo "Found: $ATT"
          node -e "
          const fs = require('fs');
          const env = JSON.parse(fs.readFileSync('$ATT', 'utf8'));
          if (env.payloadType !== 'application/vnd.in-toto+json') throw new Error('Wrong payloadType');
          const payload = JSON.parse(Buffer.from(env.payload, 'base64').toString());
          console.log('step name:', payload.predicate?.name);
          if (payload.predicate?.name !== 'test-js-action') throw new Error('Wrong step name');
          const attestations = payload.predicate?.attestations || [];
          const types = attestations.map(a => a.type);
          console.log('Attestor types:', types);
          const ga = attestations.find(a => a.type.includes('github-action'));
          if (!ga) throw new Error('Missing github-action attestor');
          console.log('github-action attestor data:', JSON.stringify(ga.attestation, null, 2));
          if (ga.attestation.actionref !== 'test/test-js-action@v1') throw new Error('Wrong actionref');
          if (ga.attestation.actiontype !== 'javascript') throw new Error('Wrong actiontype');
          console.log('=== PASS: JS action wrapping with github-action attestor ===');
          "

