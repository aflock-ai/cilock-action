name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cilock-action
        uses: actions/checkout@v6
        with:
          path: cilock-action

      - name: Checkout rookery
        uses: actions/checkout@v6
        with:
          repository: aflock-ai/rookery
          path: rookery

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.10
          working-directory: cilock-action

  # Test on REAL runners for every goos/goarch pair the released binaries
  # support (linux/amd64, linux/arm64, darwin/amd64, darwin/arm64) — a
  # cross-compile alone proves nothing about runtime behavior on arm64/darwin.
  test:
    name: Test (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            coverage: true
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - runner: macos-13
            goos: darwin
            goarch: amd64
          - runner: macos-latest
            goos: darwin
            goarch: arm64
    steps:
      - name: Checkout cilock-action
        uses: actions/checkout@v6
        with:
          path: cilock-action

      - name: Checkout rookery
        uses: actions/checkout@v6
        with:
          repository: aflock-ai/rookery
          path: rookery

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Run tests with coverage
        working-directory: cilock-action
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Check coverage
        if: matrix.coverage
        working-directory: cilock-action
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep '^total:' | tail -1 | awk '{print $NF}' | sed 's/%//')
          echo "Coverage: ${COVERAGE}%"
          if [ -f .coverage-baseline.json ]; then
            BASELINE=$(cat .coverage-baseline.json | grep -o '"total":[^,}]*' | grep -o '[0-9.]*')
            if [ -n "$BASELINE" ]; then
              if [ "$(echo "$COVERAGE < $BASELINE" | bc -l)" = "1" ]; then
                echo "::error::Coverage regressed from ${BASELINE}% to ${COVERAGE}%"
                exit 1
              fi
            fi
          fi
          echo "## Test Coverage: ${COVERAGE}%" >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=coverage.out | tail -20 >> "$GITHUB_STEP_SUMMARY"

  # The action's entrypoint is shim/index.js running against the COMMITTED
  # shim/node_modules — there is no build/bundle step. Two gates keep that
  # honest: the shim's own unit tests (platform/arch → asset mapping,
  # version resolution, checksum parsing), and a vendor-sync check that
  # fails if node_modules drifts from package-lock.json (a dep bump without
  # re-vendoring would otherwise ship silently stale).
  shim:
    name: Shim (tests + vendored node_modules sync)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cilock-action
        uses: actions/checkout@v6

      - name: Setup Node (action runtime version)
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Run shim unit tests
        working-directory: shim
        run: node --test resolve.test.js

      - name: Verify vendored node_modules matches package-lock.json
        working-directory: shim
        run: |
          npm ci --no-audit --no-fund
          if [ -n "$(git status --porcelain .)" ]; then
            git status --porcelain .
            echo "::error::shim/node_modules is out of sync with package-lock.json — run 'npm ci' in shim/ and commit the result"
            exit 1
          fi

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout cilock-action
        uses: actions/checkout@v6
        with:
          path: cilock-action

      - name: Checkout rookery
        uses: actions/checkout@v6
        with:
          repository: aflock-ai/rookery
          path: rookery

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build binary
        working-directory: cilock-action
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then
            EXT=".exe"
          fi
          go build -trimpath -tags netgo \
            -ldflags="-s -w -X main.version=ci" \
            -o cilock-action_${GOOS}_${GOARCH}${EXT} \
            ./cmd/cilock-action/

      - name: Compress with UPX
        if: matrix.goos == 'linux'
        working-directory: cilock-action
        run: |
          sudo apt-get install -y upx-ucl >/dev/null 2>&1 || true
          BINARY="cilock-action_${{ matrix.goos }}_${{ matrix.goarch }}"
          BEFORE=$(stat --format=%s "$BINARY")
          upx --best --lzma "$BINARY" || echo "::warning::UPX compression failed — using uncompressed binary"
          AFTER=$(stat --format=%s "$BINARY")
          echo "Compressed: $(( BEFORE / 1024 / 1024 ))MB → $(( AFTER / 1024 / 1024 ))MB"

      - name: Verify binary size < 100MB
        working-directory: cilock-action
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi
          BINARY="cilock-action_${{ matrix.goos }}_${{ matrix.goarch }}${EXT}"
          SIZE=$(stat --format=%s "$BINARY")
          MAX=$((100 * 1024 * 1024))
          echo "Binary size: $SIZE bytes ($(( SIZE / 1024 / 1024 ))MB)"
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "::error::Binary $BINARY exceeds 100MB limit: ${SIZE} bytes"
            exit 1
          fi

  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cilock-action
        uses: actions/checkout@v6
        with:
          path: cilock-action

      - name: Checkout rookery
        uses: actions/checkout@v6
        with:
          repository: aflock-ai/rookery
          path: rookery

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Run fuzz tests (30s each)
        working-directory: cilock-action
        run: |
          for pkg in ./internal/actions ./internal/platform ./internal/config; do
            for fuzz in $(go test -list 'Fuzz.*' -tags audit "$pkg" 2>/dev/null | grep '^Fuzz'); do
              echo "::group::$pkg/$fuzz"
              go test -tags audit -fuzz="^${fuzz}$" -fuzztime=30s "$pkg" || true
              echo "::endgroup::"
            done
          done
