name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cilock-action
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          path: cilock-action

      - name: Checkout rookery
        uses: actions/checkout@v6
        with:
          repository: aflock-ai/rookery
          path: rookery

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install npm dependencies for JS shim
        run: npm install
        working-directory: cilock-action/shim

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
          workdir: cilock-action
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update major version alias (stable releases only)
        # Float the @vN major alias to the latest STABLE release. Pre-releases
        # (e.g. v2.0.0-rc1 — any tag with a hyphen) are SKIPPED so cutting an RC
        # never silently re-points @vN consumers at a pre-release. The alias
        # tracks the tag's own major (v1 -> v1, v2.0.0 -> v2), so the unified
        # v2 line updates @v2 rather than clobbering @v1.
        if: ${{ !contains(github.ref_name, '-') }}
        working-directory: cilock-action
        run: |
          MAJOR="${GITHUB_REF_NAME%%.*}"   # v2.0.0 -> v2
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa "$MAJOR" -m "Update $MAJOR tag to ${GITHUB_REF_NAME}"
          git push origin "$MAJOR" --force
