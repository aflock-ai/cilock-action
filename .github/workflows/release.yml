name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      rookery_ref:
        description: 'rookery ref (branch / tag / SHA) — defaults to main'
        type: string
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cilock-action
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          path: cilock-action

      - name: Checkout rookery
        uses: actions/checkout@v6
        with:
          repository: aflock-ai/rookery
          # Defaults to main on tag pushes; workflow_dispatch input
          # lets us cut a cilock-action dev release that embeds a
          # specific rookery branch / tag (e.g. nk/ci-trace-mode-probe
          # or v1.1.0-rc48) for testing new attestor code before
          # merging to main.
          ref: ${{ inputs.rookery_ref }}
          path: rookery

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install npm dependencies for JS shim
        run: npm install
        working-directory: cilock-action/shim

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
          workdir: cilock-action
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update v1 major version tag
        working-directory: cilock-action
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa v1 -m "Update v1 tag to ${GITHUB_REF_NAME}"
          git push origin v1 --force
