name: Shim compare (Node zero-dep vs composite)

# Proves both bootstrap variants work as real GitHub Actions across OSes AND
# that the wrapped run actually captures a compilation:
#   - Variant A: repo-root action.yml (using: node24, zero npm deps)
#   - Variant B: .github/test-actions/composite (using: composite, shell)
# Each compiles a tiny Go program (a self-contained nested module so it does
# not pick up cilock-action's own go.mod) through cilock-action; the
# command-run + product attestors must record the build and the resulting
# binary's digest. Sigstore/Archivista are off — we test capture, not signing.

on:
  push:
    branches: [nk/shim-rewrite-compare]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  variant-a-node:
    name: A · node24 zero-dep (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.21"
      - name: Prepare a self-contained program to compile
        shell: bash
        run: |
          mkdir -p buildtest
          printf 'module hellotest\n\ngo 1.21\n' > buildtest/go.mod
          printf 'package main\n\nfunc main() { println("hello from cilock shim test") }\n' > buildtest/hello.go
      - name: Compile via zero-dep Node shim
        uses: ./
        with:
          step: "compile-node"
          workingdir: buildtest
          command: "go build -o hello_built ."
          attestations: "environment command-run product"
          enable-sigstore: "false"
          enable-archivista: "false"
          outfile: "${{ github.workspace }}/attestation.json"
      - name: Assert the compilation + product digest were captured
        shell: bash
        run: |
          test -f attestation.json || { echo "::error::no attestation.json (A/${{ matrix.os }})"; exit 1; }
          python3 - <<'PY'
          import json, base64
          d = json.load(open("attestation.json"))
          # cilock emits a DSSE envelope; the in-toto statement (subjects =
          # captured products, predicate = command-run etc.) is the base64
          # payload, not the envelope itself.
          payload = base64.b64decode(d["payload"]).decode("utf-8", "replace")
          stmt = json.loads(payload)
          subjects = [s.get("name", "") for s in stmt.get("subject", [])]
          print("envelope keys:", list(d))
          print("subjects:", subjects)
          print("contains hello_built:", "hello_built" in payload, "| sha256:", "sha256" in payload, "| build cmd:", "build" in payload)
          assert "hello_built" in payload, "compiled product hello_built not captured in attestation"
          assert "sha256" in payload, "no sha256 digest in attestation"
          assert "build" in payload, "command-run did not record the build command"
          print("Variant A: compilation + product digest captured")
          PY

  variant-b-composite:
    name: B · composite shell (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.21"
      - name: Prepare a self-contained program to compile
        shell: bash
        run: |
          mkdir -p buildtest
          printf 'module hellotest\n\ngo 1.21\n' > buildtest/go.mod
          printf 'package main\n\nfunc main() { println("hello from cilock shim test") }\n' > buildtest/hello.go
      - name: Compile via composite shell action
        uses: ./.github/test-actions/composite
        with:
          step: "compile-composite"
          workingdir: buildtest
          command: "go build -o hello_built ."
          attestations: "environment command-run product"
          enable-sigstore: "false"
          enable-archivista: "false"
          outfile: "${{ github.workspace }}/attestation.json"
      - name: Assert the compilation + product digest were captured
        shell: bash
        run: |
          test -f attestation.json || { echo "::error::no attestation.json (B/${{ matrix.os }})"; exit 1; }
          python3 - <<'PY'
          import json, base64
          d = json.load(open("attestation.json"))
          # cilock emits a DSSE envelope; the in-toto statement (subjects =
          # captured products, predicate = command-run etc.) is the base64
          # payload, not the envelope itself.
          payload = base64.b64decode(d["payload"]).decode("utf-8", "replace")
          stmt = json.loads(payload)
          subjects = [s.get("name", "") for s in stmt.get("subject", [])]
          print("envelope keys:", list(d))
          print("subjects:", subjects)
          print("contains hello_built:", "hello_built" in payload, "| sha256:", "sha256" in payload, "| build cmd:", "build" in payload)
          assert "hello_built" in payload, "compiled product hello_built not captured in attestation"
          assert "sha256" in payload, "no sha256 digest in attestation"
          assert "build" in payload, "command-run did not record the build command"
          print("Variant B: compilation + product digest captured")
          PY
