name: Shim compare (Node zero-dep vs composite)

# Proves both bootstrap variants work as real GitHub Actions across OSes AND
# that the wrapped run actually captures a compilation:
#   - Variant A: repo-root action.yml (using: node24, zero npm deps)
#   - Variant B: .github/test-actions/composite (using: composite, shell)
# Each compiles a tiny Go program through cilock-action; the command-run +
# product attestors must record the build and the resulting binary's digest.
# Sigstore/Archivista are off — we're testing capture, not the signing platform.

on:
  push:
    branches: [nk/shim-rewrite-compare]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  variant-a-node:
    name: A · node24 zero-dep (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Prepare a program to compile
        shell: bash
        run: |
          mkdir -p buildtest
          cat > buildtest/hello.go <<'GO'
          package main

          func main() { println("hello from cilock shim test") }
          GO
      - name: Compile via zero-dep Node shim
        uses: ./
        with:
          step: "compile-node"
          workingdir: buildtest
          command: "go build -o hello_built hello.go"
          attestations: "environment command-run product"
          enable-sigstore: "false"
          enable-archivista: "false"
          outfile: "${{ github.workspace }}/attestation.json"
      - name: Assert the compilation + product digest were captured
        shell: bash
        run: |
          test -f attestation.json || { echo "::error::no attestation.json (A/${{ matrix.os }})"; exit 1; }
          python3 - <<'PY'
          import json
          s = json.dumps(json.load(open("attestation.json")))
          assert "hello_built" in s, "compiled product hello_built not captured in attestation"
          assert "sha256" in s, "no sha256 digest in attestation"
          assert "go build" in s, "command-run did not record the build command"
          print("Variant A: compilation + product digest captured")
          PY

  variant-b-composite:
    name: B · composite shell (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Prepare a program to compile
        shell: bash
        run: |
          mkdir -p buildtest
          cat > buildtest/hello.go <<'GO'
          package main

          func main() { println("hello from cilock shim test") }
          GO
      - name: Compile via composite shell action
        uses: ./.github/test-actions/composite
        with:
          step: "compile-composite"
          workingdir: buildtest
          command: "go build -o hello_built hello.go"
          attestations: "environment command-run product"
          enable-sigstore: "false"
          enable-archivista: "false"
          outfile: "${{ github.workspace }}/attestation.json"
      - name: Assert the compilation + product digest were captured
        shell: bash
        run: |
          test -f attestation.json || { echo "::error::no attestation.json (B/${{ matrix.os }})"; exit 1; }
          python3 - <<'PY'
          import json
          s = json.dumps(json.load(open("attestation.json")))
          assert "hello_built" in s, "compiled product hello_built not captured in attestation"
          assert "sha256" in s, "no sha256 digest in attestation"
          assert "go build" in s, "command-run did not record the build command"
          print("Variant B: compilation + product digest captured")
          PY
