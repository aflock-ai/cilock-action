name: Dogfood

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  dogfood:
    name: Self-test with cilock-action
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout rookery (dependency)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: aflock-ai/rookery
          path: rookery

      - name: Rewrite replace directives for CI
        run: sed -i 's|=> \.\./rookery/|=> ./rookery/|g' go.mod

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.26'

      - name: Build cilock-action binary
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=dogfood" \
            -o /usr/local/bin/cilock-action \
            ./cmd/cilock-action/

      - name: Run tests wrapped by cilock-action
        uses: ./
        with:
          step: "dogfood-test"
          command: "go test -race -count=1 ./..."
          enable-sigstore: "false"
          enable-archivista: "false"
          outfile: "attestation.json"
          attestations: "environment git github"

      - name: Verify attestation is valid JSON
        run: |
          if [ ! -f attestation.json ]; then
            echo "::error::Attestation file not found"
            exit 1
          fi
          python3 -c "import json; json.load(open('attestation.json'))"
          echo "Attestation file is valid JSON"
