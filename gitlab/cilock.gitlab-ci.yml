# cilock GitLab CI Template
#
# Include this template in your .gitlab-ci.yml and extend the .cilock hidden job.
# Configuration is done via CILOCK_* environment variables.
#
# Example:
#   include:
#     - remote: 'https://raw.githubusercontent.com/aflock-ai/cilock-action/v1/gitlab/cilock.gitlab-ci.yml'
#
#   build:
#     extends: .cilock
#     variables:
#       CILOCK_STEP: build
#       CILOCK_COMMAND: "go build -o myapp ./cmd/myapp"

.cilock:
  image: golang:1.23
  variables:
    # "latest" resolves the newest release. Pin a FULL release tag (e.g.
    # "v1.0.4") to pin a version — major alias tags like "v1" are git tags
    # without a GitHub Release, so they have no downloadable assets.
    CILOCK_VERSION: "latest"
    CILOCK_ENABLE_ARCHIVISTA: "true"
    CILOCK_ARCHIVISTA_SERVER: "https://web.platform.testifysec.com"
    CILOCK_ATTESTATIONS: "environment git gitlab"
    CILOCK_HASHES: "sha256"
    CILOCK_TIMESTAMP_SERVERS: "https://tsa.platform.testifysec.com/api/v1/timestamp"
    CILOCK_PRODUCT_INCLUDE_GLOB: "*"
  before_script:
    - |
      set -euo pipefail

      # Detect OS/architecture. cilock binaries ship for linux/{amd64,arm64}
      # and darwin/{amd64,arm64}; this docker-executor template supports the
      # linux pair and fails clearly elsewhere.
      OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
      if [ "${OS}" != "linux" ]; then
        echo "Unsupported OS for the cilock GitLab template: ${OS} (supported: linux/amd64, linux/arm64)" >&2
        exit 1
      fi
      ARCH="$(uname -m)"
      case "${ARCH}" in
        x86_64)        ARCH="amd64" ;;
        aarch64|arm64) ARCH="arm64" ;;
        *)
          echo "Unsupported architecture: ${ARCH} (supported: linux/amd64, linux/arm64)" >&2
          exit 1
          ;;
      esac

      # Download the cilock-action release tarball + verify its sha256
      # against the checksums.txt published in the same release.
      ASSET="cilock-action_${OS}_${ARCH}.tar.gz"
      if [ "${CILOCK_VERSION}" = "latest" ]; then
        BASE_URL="https://github.com/aflock-ai/cilock-action/releases/latest/download"
      else
        BASE_URL="https://github.com/aflock-ai/cilock-action/releases/download/${CILOCK_VERSION}"
      fi
      echo "Downloading cilock-action from ${BASE_URL}/${ASSET}"
      curl -fsSL -o "/tmp/${ASSET}" "${BASE_URL}/${ASSET}"
      curl -fsSL -o /tmp/cilock-checksums.txt "${BASE_URL}/checksums.txt"
      (cd /tmp && grep " ${ASSET}\$" cilock-checksums.txt | sha256sum -c -)
      tar -xzf "/tmp/${ASSET}" -C /usr/local/bin cilock-action
      chmod +x /usr/local/bin/cilock-action
      echo "cilock-action installed: $(cilock-action --version 2>&1 || true)"
  script:
    - cilock-action
  artifacts:
    reports:
      dotenv: cilock.env
