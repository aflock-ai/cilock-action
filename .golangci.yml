version: "2"

linters:
  default: standard
  enable:
    - gosec
    - bodyclose
    - noctx
    - gocritic
    - revive
    - unparam
    - misspell
    - prealloc
  settings:
    errcheck:
      check-type-assertions: false
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (net.Conn).Close
        - fmt.Printf
        - fmt.Println
        - fmt.Fprintf
        - fmt.Fprintln
        - os.Remove
        - os.RemoveAll
        - os.Setenv
        - os.Unsetenv
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - hugeParam
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: exported
          disabled: true
        - name: increment-decrement
        - name: var-naming
          disabled: true
        - name: package-comments
          disabled: true
    gosec:
      excludes:
        - G104  # Audit errors (covered by errcheck)
        - G204  # Subprocess with variable — CI tool must exec user commands
        - G302  # File permissions — CI output files need 0644
        - G304  # File inclusion via variable — CI tool reads user-specified files
        - G306  # WriteFile permissions — CI output files need 0644
        - G703  # Path traversal — CI tool resolves user-specified action paths
        - G702  # Command injection via taint — CI tool builds docker commands from user input
        - G704  # SSRF — CI tool downloads actions from GitHub
    staticcheck:
      checks:
        - all
        - -SA1019
        - -ST1000
        - -ST1003
        - -ST1020
        - -ST1021
        - -ST1022
        - -QF1002
        - -QF1012

  exclusions:
    paths:
      - ".*\\.pb\\.go$"
      - ".*_gen\\.go$"
      - zz_generated.deepcopy.go
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - gocritic

formatters:
  enable:
    - gofmt
    - goimports

run:
  timeout: 5m
