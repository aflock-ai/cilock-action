version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosec
    - bodyclose
    - noctx
    - gocritic
    - revive
    - unparam
    - misspell

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - hugeParam
        - rangeValCopy

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: exported
          disabled: true
        - name: increment-decrement
        - name: var-naming
          disabled: true
        - name: package-comments
          disabled: true

    gosec:
      excludes:
        - G104  # covered by errcheck
        - G204  # subprocess launch — expected in CLI tool
        - G304  # file inclusion via variable — expected in CLI tool
        - G306  # file permissions — attestation output files
        - G703  # path traversal — action resolver handles untrusted paths intentionally
        - G704  # SSRF — HTTP calls to user-configured URLs are by design

    staticcheck:
      checks:
        - "all"
        - "-SA1019"
        - "-SA1024"
        - "-ST1000"
        - "-ST1003"
        - "-ST1020"
        - "-ST1021"
        - "-ST1022"
        - "-QF1002"
        - "-QF1012"

  exclusions:
    paths:
      - ".*\\.pb\\.go$"
      - ".*_gen\\.go$"
      - zz_generated.deepcopy.go

    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - gocritic
      # Best-effort cleanup calls — not actionable
      - linters:
          - errcheck
        text: "Error return value of `(resp\\.Body\\.Close|os\\.RemoveAll|f\\.Close|fmt\\.Fprint)` is not checked"
      # main.go exitAfterDefer — acceptable in CLI entry point
      - path: main\.go
        linters:
          - gocritic

formatters:
  enable:
    - gofmt
    - goimports
